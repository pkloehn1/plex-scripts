# git-cliff configuration for CalVer changelog generation
# Docs: https://git-cliff.org/docs/configuration

[changelog]
header = """# Changelog

All notable changes to this project will be documented in this file.
"""
body = """
{%- if version %}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{%- else %}
## [Unreleased]
{%- endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
{%- if commit.scope %}
- _({{ commit.scope }})_ {{ commit.message | upper_first }} ({{ commit.id | truncate(length=7, end="") }})\
{%- else %}
- {{ commit.message | upper_first }} ({{ commit.id | truncate(length=7, end="") }})\
{%- endif %}
{% endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
    { message = "^feat", group = "🚀 Features" },
    { message = "^fix", group = "🐛 Bug Fixes" },
    { message = "^docs", group = "📖 Documentation" },
    { message = "^perf", group = "⚡ Performance" },
    { message = "^security", group = "🛡️ Security" },
    { message = "^refactor", group = "🚜 Refactor" },
    { message = "^style", group = "🎨 Styling" },
    { message = "^test", group = "🧪 Testing" },
    { message = "^ci", group = "🔧 CI/CD" },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore", group = "⚙️ Miscellaneous" },
    { message = "^Bump", group = "📦 Dependencies" },
]
tag_pattern = "v\\d{4}\\.\\d{2}\\.\\d+"
sort_commits = "newest"
