# ---------------------------------------------------------------------------
# SonarCloud configuration
# https://docs.sonarsource.com/sonarcloud/advanced-setup/analysis-parameters/
# ---------------------------------------------------------------------------

sonar.projectKey=pkloehn1_repo-template
sonar.organization=pkloehn1

# Python version — keep in sync with pyproject.toml requires-python
sonar.python.version=3.11

# Source and test layout
sonar.sources=scripts/
sonar.tests=scripts/
sonar.test.inclusions=**/tests/**,**/test_*.py

# Paths excluded from analysis
sonar.exclusions=\
  docs/**,\
  tmp/**,\
  .venv/**,\
  **/__pycache__/**,\
  scripts/linting/**,\
  scripts/testing/**,\
  scripts/precommit/**

# Coverage report (generated by pytest-cov in CI)
sonar.python.coverage.reportPaths=coverage.xml
