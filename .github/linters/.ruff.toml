# Ruff configuration for Super-Linter consumption.
#
# Source of truth: pyproject.toml [tool.ruff].
# This file exists because Super-Linter passes --config to ruff, which
# bypasses pyproject.toml discovery.  Keep these settings in sync with
# pyproject.toml whenever ruff configuration changes.

line-length = 120
target-version = "py311"

[lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "SIM",    # flake8-simplify
    "N",      # pep8-naming
    "D",      # pydocstyle
    "RUF",    # ruff-specific rules
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "SIM108", # Use ternary operator (readability preference)
    "D100",   # undocumented-public-module (phased rollout)
    "D101",   # undocumented-public-class (phased rollout)
    "D102",   # undocumented-public-method (phased rollout)
    "D103",   # undocumented-public-function (phased rollout)
    "D107",   # undocumented-public-init (phased rollout)
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]

[lint.isort]
known-first-party = ["scripts"]

[lint.pydocstyle]
convention = "google"

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "lf"
