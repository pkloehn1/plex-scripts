---
# CalVer tagging workflow
# Creates a CalVer tag and GitHub Release on every push to main
# Version format: YYYY.0M.MICRO (e.g., v2026.03.0)

name: CalVer Tag

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  calver-tag:
    name: Compute version and tag
    if: >
      !contains(github.event.head_commit.message, 'chore(release):') &&
      !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e '.[dev]'

      - name: Compute next version
        id: calver
        run: |
          version=$(.venv/bin/python -m scripts.devops.calver --dry-run)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: check
        run: |
          if git tag -l "${{ steps.calver.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create annotated tag via helper
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          .venv/bin/python -m scripts.github.create_tag \
            --repo "${{ github.repository }}" \
            --tag "${{ steps.calver.outputs.tag }}" \
            --sha "${{ github.sha }}" \
            --message "Release ${{ steps.calver.outputs.tag }}"

      - name: Generate release notes
        id: changelog
        if: steps.check.outputs.exists == 'false'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag ${{ steps.calver.outputs.tag }} --unreleased --strip header
        env:
          OUTPUT: release-notes.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.calver.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "${{ steps.calver.outputs.tag }}" \
            --notes-file release-notes.md
...
