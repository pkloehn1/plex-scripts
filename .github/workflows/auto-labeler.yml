---
name: Auto Labeler

on:
  pull_request_target:
    types: [opened, synchronize, edited, reopened, ready_for_review]
  issues:
    types: [opened, edited]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

permissions: {}

jobs:
  path-labels:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: false

  keyword-labels:
    needs: path-labels
    if: always() && (github.event_name == 'pull_request_target' || github.event_name == 'issues') && needs.path-labels.result != 'cancelled'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Apply keyword and file-based labels
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m scripts.ci.keyword_labeler

  sync-issue-labels:
    needs: keyword-labels
    if: always() && github.event_name == 'pull_request_target' && needs.keyword-labels.result != 'cancelled'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read

    steps:
      - name: Sync labels from linked issues
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info('No pull_request in context; exiting.');
              return;
            }

            const body = pr.body || '';
            const refs = [...new Set((body.match(/#(\d+)/g) || []).map((s) => s.replace('#', '')))]
              .map((n) => Number(n))
              .filter((n) => Number.isInteger(n) && n > 0);

            if (refs.length === 0) {
              core.info('No issue references found in PR body; nothing to sync.');
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const labelsToAdd = new Set();

            for (const num of refs) {
              try {
                const { data: issue } = await github.rest.issues.get({ owner, repo, issue_number: num });
                if (issue && Array.isArray(issue.labels)) {
                  for (const lbl of issue.labels) {
                    const name = typeof lbl === 'string' ? lbl : lbl.name;
                    if (name) labelsToAdd.add(name);
                  }
                }
              } catch (e) {
                core.warning(`Failed to fetch issue #${num}: ${e.message}`);
              }
            }

            if (labelsToAdd.size === 0) {
              core.info('No labels to add from referenced issues.');
              return;
            }

            try {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pr.number,
                labels: Array.from(labelsToAdd),
              });
            } catch (e) {
              const message = e && e.message ? e.message : String(e);
              core.warning(`Failed to add labels to PR #${pr.number}: ${message}`);
            }

  issue-template-labels:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Apply labels based on issue Type dropdown
        uses: actions/github-script@v9
        with:
          script: |
            const issue = context.payload.issue;
            if (!issue) {
              core.info('No issue in context; exiting.');
              return;
            }

            const body = issue.body || '';
            // GitHub renders dropdown values on a separate line from the heading.
            // Match: ### Type\n\nvalue (with variable whitespace/newlines, LF or CRLF).
            const match = body.match(/### Type\s*(?:\r?\n)+\s*([^\n]+)/);
            if (!match) {
              core.info('No Type dropdown found in issue body; skipping.');
              return;
            }

            const typeValue = match[1].trim();
            if (typeValue === '_No response_' || /^_No\b/i.test(typeValue)) {
              core.info(`Type dropdown has no selection (${typeValue}); skipping.`);
              return;
            }
            const labelMap = {
              'work-package': ['status/wip'],
              'incident-rca': ['incident', 'rca'],
            };

            const labels = labelMap[typeValue];
            if (!labels) {
              core.warning(`Unknown Type value: "${typeValue}"; skipping.`);
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Remove stale type labels (labels belonging to other types).
            const staleLabels = new Set(
              Object.values(labelMap).flat().filter(l => !labels.includes(l)),
            );
            const currentNames = (issue.labels || []).map(
              l => (typeof l === 'string' ? l : l.name),
            );
            for (const stale of staleLabels) {
              if (!currentNames.includes(stale)) continue;
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issue.number,
                  name: stale,
                });
                core.info(`Removed stale label "${stale}" from issue #${issue.number}.`);
              } catch (e) {
                if (e.status !== 404) throw e;
              }
            }

            // Add the new type labels.
            try {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issue.number,
                labels,
              });
              core.info(`Applied labels [${labels.join(', ')}] to issue #${issue.number}.`);
            } catch (e) {
              const message = e && e.message ? e.message : String(e);
              core.warning(`Failed to add labels to issue #${issue.number}: ${message}`);
            }
...
