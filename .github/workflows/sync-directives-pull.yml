---
name: Sync AI Directives ← targets

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: sync-directives-pull
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      targets: ${{ steps.parse.outputs.targets || '[]' }}
    steps:
      - name: Check for sync token
        shell: bash
        env:
          SYNC_PAT_SET: ${{ secrets.REPO_SYNC_PAT != '' }}
        run: |
          echo "HAS_TOKEN=${SYNC_PAT_SET}" >> "$GITHUB_ENV"
          if [ "${SYNC_PAT_SET}" != "true" ]; then
            echo "::notice::REPO_SYNC_PAT secret not configured - skipping sync."
          fi

      - name: Checkout
        if: env.HAS_TOKEN == 'true'
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Read target repos from config
        if: env.HAS_TOKEN == 'true'
        id: parse
        uses: ./.github/actions/parse-sync-targets

  sync:
    needs: prepare
    if: needs.prepare.outputs.targets != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.targets) }}

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          path: local

      - name: Checkout remote
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.target.repo }}
          token: ${{ secrets.REPO_SYNC_PAT }}
          persist-credentials: false
          path: remote

      - name: Compute branch slug
        id: branch
        shell: bash
        env:
          TARGET_REPO: ${{ matrix.target.repo }}
        run: |
          echo "slug=${TARGET_REPO//\//-}" >> "$GITHUB_OUTPUT"

      - name: Sync directive files
        uses: ./local/.github/actions/run-sync-directives
        with:
          source: remote
          target: local
          target-repo: ${{ matrix.target.repo }}
          config: local/.github/sync-directives.yml
          pythonpath: local

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.REPO_SYNC_PAT }}
          path: local
          branch: sync/ai-directives-from-${{ steps.branch.outputs.slug }}
          title: "chore: sync AI directives from ${{ matrix.target.repo }}"
          body: |
            Automated sync of AI directive files from
            [${{ matrix.target.repo }}](https://github.com/${{ matrix.target.repo }}).
          commit-message: "chore: sync AI directives from ${{ matrix.target.repo }}"
          committer: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          delete-branch: true
...
